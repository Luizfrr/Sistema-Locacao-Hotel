<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Funcionário</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    <div class="max-w-3xl mx-auto mt-12 p-6 bg-white rounded-xl shadow-md space-y-6">
        <h2 class="text-2xl font-bold text-yellow-600">Editar Funcionário</h2>

        <form action="/funcionario/update/{{ funcionario.id }}" method="POST" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Nome:</label>
                <input type="text" id="name" name="name" value="{{ funcionario.name }}" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500">
            </div>

            <div>
                <label for="telephone" class="block text-sm font-medium text-gray-700">Telefone:</label>
                <input type="text" id="telephone" name="telephone" value="{{ funcionario.telephone }}" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500">
            </div>

            <div>
                <label for="cpf" class="block text-sm font-medium text-gray-700">CPF:</label>
                <input type="text" id="cpf" name="cpf" value="{{ funcionario.cpf }}" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500">
            </div>

            <div>
                <label for="date_of_birth" class="block text-sm font-medium text-gray-700">Data de Nascimento:</label>
                <input type="date" id="date_of_birth" name="date_of_birth" value="{{ funcionario.date_of_birth }}"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500">
            </div>

            <div>
                <label for="hiring_date" class="block text-sm font-medium text-gray-700">Data de Contratação:</label>
                <input type="date" id="hiring_date" name="hiring_date" value="{{ funcionario.hiring_date }}"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500">
            </div>

            <div>
                <label for="job_title" class="block text-sm font-medium text-gray-700">Cargo:</label>
                <input type="text" id="job_title" name="job_title" value="{{ funcionario.job_title }}"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500">
            </div>

            <button type="submit"
                class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-2 px-4 rounded shadow">
                Atualizar Funcionário
            </button>
        </form>
    </div>
</body>
</html>
